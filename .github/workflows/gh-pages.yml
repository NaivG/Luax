name: Deploy Documentation

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.png'
      - '.github/workflows/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '**.yml'
      - '.gitignore'
      - '.pubignore'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: |
          dart pub global activate dartdoc_modern
          dart pub get

      - name: Generate API docs
        run: dart pub global run dartdoc_modern --format vitepress --output docs-site

      - name: Replace files
        run: |
          cp -r assets docs-site/api
          cp -f .github/docs/* docs-site

      - uses: actions/setup-node@v6
        with:
          node-version: 'latest'

      - run: npm ci
        working-directory: docs-site

      - run: npx vitepress build
        working-directory: docs-site

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
