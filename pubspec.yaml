name: luax
description: A pure-Dart Lua 5.3 VM with extra feature, and improvements over upstream LuaDardo/LuaDardoPlus.
version: 0.3.1
homepage: https://github.com/NaivG/Luax
repository: https://github.com/NaivG/Luax
issue_tracker: https://github.com/NaivG/Luax/issues
# TODO: due to sprintf being a git dep
publish_to: none
environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  sprintf:
    git:
      url: https://github.com/Telosnex/dart-sprintf.git
      ref: master

dev_dependencies:
  glados: ^1.1.7
  lints: ^4.0.0
  test: ^1.25.0
  vm_service: ^15.2.0
